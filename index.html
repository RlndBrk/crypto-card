<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,500;1,14..32,500&family=Outfit:wght@100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png" />

    <title>Frontend Mentor | NFT preview card component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 11px;
        text-align: center;
        color: white;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <div class="card-img">
          <img class="" src="images/image-equilibrium.jpg" alt="card-img" />
          <div class="overlay">
            <img src="images/icon-view.svg" alt="view icon" />
          </div>
        </div>
        <div class="card-p-name">
          <h1 class="text-preset1">Equilibrium #3429</h1>
        </div>
        <div class="card-content">
          <p class="text-preset2">Our Equilibrium collection promotes balance and calm.</p>
        </div>
        <div class="card-data">
          <div class="currency"><img src="images/icon-ethereum.svg" alt="" /><span>0.041 ETH</span></div>
          <div class="post-time"><img src="images/icon-clock.svg" alt="" /><span>3 days left</span></div>
        </div>
        <div class="card-footer">
          <img class="profile-img" src="images/image-avatar.png" alt="" />
          <p class="caption"><span>Creation of</span> <span class="pname">Jules Wyvern</span></p>
        </div>
      </div>
    </main>

    <div class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. Coded by
      <a href="#">Roland Borka</a>.
    </div>
  </body>
</html>
